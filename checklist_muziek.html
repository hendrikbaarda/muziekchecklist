<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Muziek</title>
<style>
body{font-family:Arial;padding:16px;background:#f5f7fb;}
.item{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;}
.item input{margin-right:10px;transform:scale(1.2);}
.done{text-decoration:line-through;color:#888;}
h2{margin-top:20px;}
</style>
</head>
<body>

<h1>Muziek Checklist</h1>
<p>Iedereen kan dit zelf afvinken op zijn telefoon 👍</p>

<h2>IN DE TAS HOUDEN</h2>
<div id="houden"></div>

<h2>INLEVEREN</h2>
<div id="inleveren"></div>

<script>
const houden = [
"Call of the Cossacks","Discoduction","The Dreaded Groove and Hook","Hunting Wabbits",
"Illusion","In the Stone","Jubilee","Meditation","Vita Aeterna Variations"
];

const inleveren = [
"Activate","Bridge over Troubled Water","Black Orpheus","Alle Duiven op de Dam","Banksy",
"The Bells of Christmas","Christmas Lullaby","A Christmas Festival","Defying Gravity",
"The Day thou Gavest","The Wonder of Christmas (festive March)","A fantasy of Joy",
"Give it one","Gonna Fly Now","Graduation Day","Gaudete","Hope","Hercab",
"Homage to Julian Assange","Into the Unknown","Keighly Moor","Live and Let Die",
"Nearer my God to Thee","Over the Rainbow","Pasmo","O Holy Night","Only in Sleep",
"Sotscop","Stop the Cavalry","O Salutaris Hostia","Sleighride","The Spirit of Christmas",
"Simoraine","Stars","Requiem","Rococo Variations","Storm","Silent Night",
"Softly Softly","Suite from Maria de Buenos Aires","The Snowman","Trumpet Concerto",
"Valley of the Pinios","Where Angels Fly","Zero to Hero","When you Wish upon a Star"
];

const key="checklist_state";
let state=JSON.parse(localStorage.getItem(key)||"{}");

function save(){localStorage.setItem(key,JSON.stringify(state));}

function render(arr,id){
  const el=document.getElementById(id);
  el.innerHTML="";
  arr.forEach(t=>{
    const d=document.createElement("div");
    d.className="item";
    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=state[t]||false;
    const span=document.createElement("span");
    span.textContent=t;
    if(cb.checked) span.classList.add("done");
    cb.onchange=()=>{
      state[t]=cb.checked;
      save();
      span.classList.toggle("done",cb.checked);
    };
    d.appendChild(cb);
    d.appendChild(span);
    el.appendChild(d);
  });
}

render(houden,"houden");
render(inleveren,"inleveren");
</script>

</body>
</html>
